<div class="col-md-4 mb-3">
  <div class="card">
    <img [src]="productImg" class="card-img-top" [alt]="productTitle" />
    <div class="card-body">
      <h5 class="card-title" (click)="handleclick()">{{ productTitle }}</h5>
      <p class="card-text">${{ productPrice }}</p>
      <button class="btn btn-primary" [disabled]="outOfStock" (click)="addToCart(productTitle,productPrice)">Add to Cart</button>
      <!-- <button class="btn btn-primary" disabled="{{ outOfStock }}">Add to Cart</button> -->
    </div>
  </div>
</div>
